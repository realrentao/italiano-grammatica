<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>第2课 · 名词的数 — 意大利语语法实战</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap">
  <style>
    :root { --green: #009246; --white: #f8f9fa; --red: #ce2b37; --blue: #1a73e8; --orange: #e8710a; --purple: #7c3aed; --bg: #f5f0e8; --card: #ffffff; --card-hover: #f0ebe3; --text: #2c2c2c; --text-dim: #6b6b6b; --border: #ddd5c8; --radius: 16px; --shadow: 0 4px 24px rgba(0,0,0,0.06); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', -apple-system, sans-serif; line-height: 1.7; overflow-x: hidden; }
    .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(245,240,232,0.88); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    .top-bar .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
    .flag-stripe { width: 36px; height: 24px; border-radius: 4px; background: linear-gradient(to bottom, var(--green) 33%, var(--white) 33% 66%, var(--red) 66%); }
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; width: 200px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--red)); border-radius: 2px; transition: width 0.5s ease; width: 0%; }
    .nav-btns { display: flex; gap: 8px; }
    .nav-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; font-family: inherit; }
    .nav-btn:hover { background: var(--card-hover); border-color: var(--blue); }
    .lesson-nav-disabled { opacity: 0.35; pointer-events: none; cursor: default; text-decoration: none; }
    .container { max-width: 860px; margin: 0 auto; padding: 80px 20px 60px; }
    .hero { text-align: center; padding: 60px 20px 40px; position: relative; }
    .hero::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(0,146,70,0.08), rgba(206,43,55,0.06), transparent 70%); pointer-events: none; }
    .lesson-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; background: rgba(0,146,70,0.15); color: var(--green); font-size: 13px; font-weight: 500; margin-bottom: 20px; border: 1px solid rgba(0,146,70,0.3); }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #2c2c2c 40%, var(--green) 70%, var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero .subtitle { font-size: 18px; color: var(--text-dim); margin-bottom: 24px; }
    .hero .hint { display: inline-flex; align-items: center; gap: 8px; background: var(--card); padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border); font-size: 14px; color: var(--text-dim); }
    .hero .hint .icon { font-size: 20px; }
    .section { margin-top: 48px; }
    .section.visible { animation: fadeInUp 0.5s ease forwards; }
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .section-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .section-title { font-size: 22px; font-weight: 700; }
    .speakable { cursor: pointer; position: relative; border-bottom: 1px dashed rgba(0,0,0,0.15); transition: all 0.2s; }
    .speakable:hover { border-bottom-color: var(--green); color: var(--green); }
    .speakable::after { content: '🔊'; font-size: 12px; margin-left: 2px; opacity: 0; transition: opacity 0.2s; position: relative; top: -2px; }
    .speakable:hover::after { opacity: 0.7; }
    .speakable.speaking { color: var(--green); animation: pulse-speak 0.6s ease infinite; }
    @keyframes pulse-speak { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .grammar-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); }
    .grammar-card .key-point { font-size: 17px; line-height: 1.8; margin-bottom: 16px; }
    .gender-badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 13px; font-weight: 600; }
    .gender-m { background: rgba(26,115,232,0.15); color: var(--blue); }
    .gender-f { background: rgba(232,113,10,0.15); color: var(--orange); }
    .example-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 16px; overflow: hidden; border-radius: 12px; }
    .example-table th { background: rgba(0,0,0,0.03); padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-dim); }
    .example-table td { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 15px; }
    .example-table tr:hover td { background: rgba(0,0,0,0.02); }
    .it-text { font-style: italic; font-weight: 500; }
    .it-flag { display: inline-block; width: 20px; height: 14px; border-radius: 2px; background: linear-gradient(to right, #009246 33%, #fff 33% 66%, #ce2b37 66%); vertical-align: middle; margin-right: 4px; }
    .zh-text { color: var(--text-dim); font-size: 14px; }
    .mnemonic-card { background: linear-gradient(135deg, rgba(0,146,70,0.1), rgba(206,43,55,0.08)); border: 1px solid rgba(0,146,70,0.25); border-radius: var(--radius); padding: 24px; text-align: center; margin-top: 20px; }
    .mnemonic-card .emoji { font-size: 32px; margin-bottom: 12px; }
    .mnemonic-card .text { font-size: 20px; font-weight: 700; line-height: 1.6; }
    .mnemonic-card .text .hl-o { color: var(--blue); }
    .mnemonic-card .text .hl-a { color: var(--orange); }
    .mnemonic-card .text .hl-e { color: var(--purple); }
    .rule-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 16px; }
    .rule-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: all 0.3s; cursor: default; position: relative; overflow: hidden; }
    .rule-card:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,146,70,0.1); }
    .rule-card .ending { font-size: 36px; font-weight: 700; font-family: 'Playfair Display', serif; margin-bottom: 8px; }
    .rule-card .ending.masc { color: var(--blue); }
    .rule-card .ending.fem { color: var(--orange); }
    .rule-card .ending.both { color: var(--purple); }
    .rule-card .gender-label { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .rule-card .examples { display: flex; flex-wrap: wrap; gap: 8px; }
    .rule-card .example-chip { background: rgba(0,0,0,0.04); padding: 5px 12px; border-radius: 8px; font-size: 14px; transition: all 0.2s; cursor: pointer; }
    .rule-card .example-chip:hover { background: rgba(0,146,70,0.15); }
    .trap-section { margin-top: 12px; }
    .trap-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .trap-tab { padding: 8px 18px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; color: var(--text-dim); }
    .trap-tab.active { border-color: var(--red); color: var(--red); background: rgba(206,43,55,0.1); }
    .trap-tab:hover:not(.active) { border-color: var(--text-dim); }
    .trap-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .trap-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; transition: all 0.3s; cursor: pointer; }
    .trap-item:hover { border-color: var(--red); transform: scale(1.02); }
    .trap-item .article { font-size: 13px; font-weight: 700; min-width: 28px; }
    .trap-item .article.il { color: var(--blue); }
    .trap-item .article.la { color: var(--orange); }
    .trap-item .word { font-size: 18px; font-weight: 600; font-style: italic; }
    .trap-item .meaning { font-size: 13px; color: var(--text-dim); margin-left: auto; }
    .trap-note { background: rgba(206,43,55,0.08); border: 1px solid rgba(206,43,55,0.2); border-radius: 10px; padding: 12px 16px; margin-top: 12px; font-size: 13px; color: #c0392b; }
    .dialogue-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-top: 16px; }
    .dialogue-line { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.04); align-items: flex-start; }
    .dialogue-line:last-child { border-bottom: none; }
    .speaker { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
    .speaker-a { background: rgba(26,115,232,0.15); color: var(--blue); }
    .speaker-b { background: rgba(0,146,70,0.15); color: var(--green); }
    .dialogue-content { flex: 1; }
    .dialogue-it { font-size: 16px; font-weight: 500; cursor: pointer; }
    .dialogue-zh { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .play-line-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; flex-shrink: 0; }
    .play-line-btn:hover { border-color: var(--green); color: var(--green); }
    .principle-card { background: linear-gradient(135deg, rgba(26,115,232,0.1), rgba(124,58,237,0.08)); border: 1px solid rgba(26,115,232,0.25); border-radius: var(--radius); padding: 24px; margin-top: 20px; text-align: center; }
    .principle-card .icon { font-size: 36px; margin-bottom: 12px; }
    .principle-card .text { font-size: 18px; font-weight: 700; line-height: 1.6; }
    .principle-card .examples-row { display: flex; justify-content: center; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
    .principle-card .example-pair { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .principle-card .good { color: var(--green); font-weight: 600; }
    .principle-card .bad { color: var(--red); text-decoration: line-through; opacity: 0.5; font-size: 13px; }
    .quiz-section { margin-top: 48px; }
    .quiz-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .quiz-counter { font-size: 14px; color: var(--text-dim); }
    .quiz-counter strong { color: var(--green); font-size: 18px; }
    .quiz-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
    .quiz-question { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
    .quiz-question .quiz-word { font-style: italic; color: var(--green); font-size: 22px; }
    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .quiz-option { background: rgba(0,0,0,0.02); border: 2px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: all 0.25s; text-align: center; font-size: 16px; }
    .quiz-option:hover:not(.answered) { border-color: var(--blue); background: rgba(26,115,232,0.08); }
    .quiz-option.correct { border-color: var(--green) !important; background: rgba(0,146,70,0.15) !important; color: var(--green); }
    .quiz-option.wrong { border-color: var(--red) !important; background: rgba(206,43,55,0.1) !important; color: var(--red); }
    .quiz-option.answered { cursor: default; }
    .quiz-feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 14px; display: none; }
    .quiz-feedback.show { display: block; }
    .quiz-feedback.right { background: rgba(0,146,70,0.1); color: var(--green); }
    .quiz-feedback.wrong-fb { background: rgba(206,43,55,0.08); color: #c0392b; }
    .quiz-mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .quiz-mode-tab { padding: 8px 18px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; color: var(--text-dim); }
    .quiz-mode-tab.active { border-color: var(--orange); color: var(--orange); background: rgba(232,113,10,0.1); }
    .flashcard-area { display: flex; flex-direction: column; align-items: center; margin-top: 16px; gap: 16px; }
    .flashcard { width: 300px; height: 200px; perspective: 600px; cursor: pointer; }
    .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back { position: absolute; inset: 0; border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; backface-visibility: hidden; padding: 20px; }
    .flashcard-front { background: linear-gradient(135deg, var(--card), #f0ebe3); border: 1px solid var(--border); }
    .flashcard-back { background: linear-gradient(135deg, rgba(0,146,70,0.15), rgba(26,115,232,0.1)); border: 1px solid rgba(0,146,70,0.3); transform: rotateY(180deg); }
    .flashcard .front-word { font-size: 28px; font-weight: 700; font-style: italic; }
    .flashcard .front-hint { font-size: 13px; color: var(--text-dim); margin-top: 8px; }
    .flashcard .back-article { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .flashcard .back-word { font-size: 24px; font-style: italic; font-weight: 600; }
    .flashcard .back-meaning { font-size: 14px; color: var(--text-dim); margin-top: 6px; }
    .flashcard-nav { display: flex; gap: 12px; }
    .flashcard-nav button { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 24px; border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .flashcard-nav button:hover { background: var(--card-hover); border-color: var(--green); }
    .flashcard-counter { font-size: 13px; color: var(--text-dim); }
    .scoreboard { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; margin-top: 32px; }
    .score-display { font-size: 48px; font-weight: 700; background: linear-gradient(135deg, var(--green), var(--blue)); }
    .score-label { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
    .score-rank { margin-top: 12px; font-size: 16px; font-weight: 600; }
    .footer { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 13px; border-top: 1px solid var(--border); margin-top: 60px; }
    .footer-nav { display: flex; justify-content: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .footer-nav .nav-btn { text-decoration: none; display: inline-flex; align-items: center; padding: 10px 20px; font-size: 14px; }
    .footer-nav .nav-btn:hover { background: var(--card-hover); border-color: var(--blue); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeInUp 0.5s ease forwards; }
    @media (max-width: 640px) { .hero h1 { font-size: 28px; } .rule-cards { grid-template-columns: 1fr; } .trap-list { grid-template-columns: 1fr; } .quiz-options { grid-template-columns: 1fr; } .flashcard { width: 260px; height: 180px; } .principle-card .examples-row { gap: 12px; } }
  </style>
</head>
